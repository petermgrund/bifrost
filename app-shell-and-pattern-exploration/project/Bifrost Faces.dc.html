<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<script src="./support.js"></script>
</head>
<body>
<x-dc>
<helmet>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="./bifrost.css">
<link rel="stylesheet" href="./bifrost-kit.css">
<style>
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
</style>
</helmet>

<div data-theme="{{theme}}" style="height:100vh;display:flex;flex-direction:column;overflow:hidden;background:var(--bf-surface);color:var(--bf-on-surface);font:var(--bf-body-medium);">

  <!-- app bar -->
  <div style="flex:none;height:64px;display:flex;align-items:center;gap:14px;padding:0 24px;background:var(--bf-surface-container-low);border-bottom:1px solid var(--bf-outline-variant);">
    <svg width="30" height="22" viewBox="0 0 30 22" aria-hidden="true"><path d="M3 20 A12 12 0 0 1 27 20" fill="none" stroke="var(--bf-tertiary)" stroke-width="2.6" stroke-linecap="round"/><path d="M7 20 A8 8 0 0 1 23 20" fill="none" stroke="var(--bf-warning)" stroke-width="2.6" stroke-linecap="round"/><path d="M11 20 A4 4 0 0 1 19 20" fill="none" stroke="var(--bf-primary)" stroke-width="2.6" stroke-linecap="round"/></svg>
    <div style="font:var(--bf-title-large);color:var(--bf-on-surface);">Bifrost</div>
    <div style="flex:1;"></div>
    <div class="bf-seg">
      <button onClick="{{setLight}}" class="{{lightSegClass}}">Light</button>
      <button onClick="{{setDark}}" class="{{darkSegClass}}">Dark</button>
    </div>
  </div>

  <!-- shell: nav + content -->
  <div style="flex:1;min-height:0;display:flex;">

    <!-- drawer nav -->
    <nav class="bf-nav" style="flex:none;width:236px;height:100%;overflow:auto;border-right:1px solid var(--bf-outline-variant);">
      <div class="bf-nav__group">
        <div class="bf-nav__label">Overview</div>
        <button class="bf-nav__item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9.6 12 3l9 6.6V20a1 1 0 0 1-1 1h-5v-6H9v6H4a1 1 0 0 1-1-1z"/></svg>Home</button>
      </div>
      <div class="bf-nav__group">
        <div class="bf-nav__label">Add</div>
        <button class="bf-nav__item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4m0 0 4 4m-4-4-4 4M5 20h14"/></svg>Upload</button>
        <button class="bf-nav__item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 6h16M4 12h16M4 18h10"/></svg>Transcribe</button>
        <button class="bf-nav__item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M14 3H7a1 1 0 0 0-1 1v16a1 1 0 0 0 1 1h10a1 1 0 0 0 1-1V7z"/><path d="M14 3v4h4"/></svg>Paperless</button>
        <button class="bf-nav__item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="5" width="18" height="14" rx="2"/><circle cx="8.5" cy="10" r="1.4"/><path d="m4 18 5-5 4 4 2-2 4 4"/></svg>Immich</button>
      </div>
      <div class="bf-nav__group">
        <div class="bf-nav__label">Curate</div>
        <button class="bf-nav__item bf-nav__item--active"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="9"/><path d="M9 10h.01M15 10h.01"/><path d="M8.5 14.5a4.5 4.5 0 0 0 7 0"/></svg>Faces</button>
        <button class="bf-nav__item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M5 16V6a1 1 0 0 1 1-1h12a1 1 0 0 1 1 1v8a1 1 0 0 1-1 1H9l-4 4z"/><path d="M9 9h6M9 12h4"/></svg>Citations</button>
      </div>
      <div class="bf-nav__group">
        <div class="bf-nav__label">Tools</div>
        <button class="bf-nav__item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s7-6 7-11a7 7 0 1 0-14 0c0 5 7 11 7 11z"/><circle cx="12" cy="10" r="2.5"/></svg>Places</button>
        <button class="bf-nav__item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19V5M4 19h16M8 16v-4M12 16V8M16 16v-6"/></svg>Activity</button>
        <button class="bf-nav__item"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 4h6.6a2 2 0 0 1 1.4.6l8 8a2 2 0 0 1 0 2.8l-5.6 5.6a2 2 0 0 1-2.8 0l-8-8A2 2 0 0 1 4 11.6z"/><path d="M8 8h.01"/></svg>IDs</button>
      </div>
    </nav>

    <!-- content -->
    <div style="flex:1;min-height:0;overflow:auto;">
      <div class="bf-page" style="padding:32px 40px;">

        <div class="bf-page__head">
          <h1 class="bf-page__title">Faces</h1>
          <p class="bf-page__desc">Link Immich-detected faces to people in your tree.</p>
        </div>

        <div class="bf-twopane bf-twopane--media">

          <!-- LEFT: filterable grid -->
          <div class="bf-card bf-card--flat">
            <div class="bf-chip-set">
              <button class="bf-chip bf-chip--selected">All 24</button>
              <button class="bf-chip">Unlinked 12</button>
              <button class="bf-chip">Linked 12</button>
            </div>
            <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;">
              <sc-for list="{{tiles}}" as="t" hint-placeholder-count="8">
                <button onClick="{{t.select}}" style="position:relative;aspect-ratio:1;border:none;border-radius:var(--bf-shape-md);cursor:pointer;padding:0;overflow:visible;{{t.css}}">
                  <sc-if value="{{t.hasFaces}}" hint-placeholder-val="{{false}}">
                    <span style="position:absolute;left:7px;top:7px;width:34%;height:34%;border:2px solid #fff;border-radius:5px;box-shadow:0 0 0 1px rgba(0,0,0,.25);"></span>
                  </sc-if>
                  <sc-if value="{{t.linked}}" hint-placeholder-val="{{false}}">
                    <span class="bf-pill bf-pill--minted" style="position:absolute;right:6px;bottom:6px;font:var(--bf-label-small);padding:1px 7px;">linked</span>
                  </sc-if>
                </button>
              </sc-for>
            </div>
          </div>

          <!-- RIGHT: detail -->
          <div class="bf-card">
            <div class="bf-card__head">
              <div class="bf-card__title">Faces in this photo</div>
              <div class="bf-card__desc">{{caption}}</div>
            </div>

            <!-- image with face boxes -->
            <div style="position:relative;border-radius:var(--bf-shape-md);overflow:hidden;aspect-ratio:4/3;box-shadow:inset 0 0 0 1px rgba(0,0,0,.12);{{heroCss}}">
              <span style="position:absolute;left:17%;top:20%;width:22%;height:33%;border:2px solid var(--bf-primary);border-radius:6px;box-shadow:0 0 0 2px rgba(255,255,255,.55);"></span>
              <span style="position:absolute;left:17%;top:53%;font:var(--bf-label-small);background:var(--bf-primary);color:var(--bf-on-primary);padding:1px 7px;border-radius:0 0 5px 5px;">unlinked</span>
              <span style="position:absolute;left:55%;top:27%;width:20%;height:30%;border:2px solid var(--bf-tertiary);border-radius:6px;box-shadow:0 0 0 2px rgba(255,255,255,.55);"></span>
              <span style="position:absolute;left:55%;top:57%;font:var(--bf-label-small);background:var(--bf-tertiary);color:var(--bf-on-tertiary);padding:1px 7px;border-radius:0 0 5px 5px;">Ada Hale</span>
            </div>

            <!-- face list -->
            <div class="bf-card__body">
              <div style="display:flex;align-items:center;gap:12px;">
                <span style="flex:none;width:38px;height:38px;border-radius:var(--bf-shape-sm);background:linear-gradient(135deg,#cbb593,#9c8157);box-shadow:inset 0 0 0 1px rgba(0,0,0,.15);"></span>
                <select class="bf-select" style="flex:1;"><option>Link to a person…</option><option>Edward Hale</option><option>Mary Hale</option></select>
                <button class="bf-btn bf-btn--tonal bf-btn--sm">Link</button>
              </div>
              <div style="display:flex;align-items:center;gap:12px;">
                <span style="flex:none;width:38px;height:38px;border-radius:var(--bf-shape-sm);background:linear-gradient(135deg,#c8a98a,#a07a55);box-shadow:inset 0 0 0 1px rgba(0,0,0,.15);"></span>
                <div style="flex:1;display:flex;align-items:center;gap:8px;"><span class="bf-pill bf-pill--minted">linked</span><span style="font:var(--bf-body-medium);color:var(--bf-on-surface);">Ada Hale</span></div>
                <button class="bf-btn bf-btn--text bf-btn--sm">Change</button>
              </div>
            </div>

            <!-- padding option, grouped with its preview -->
            <div class="bf-field">
              <span class="bf-label">Face crop padding</span>
              <input class="bf-slider" type="range" min="0" max="100" value="40" />
            </div>

            <div class="bf-actions">
              <button class="bf-btn bf-btn--filled">Apply pending (12)</button>
              <button class="bf-btn bf-btn--text">Skip this photo</button>
            </div>
          </div>

        </div>
      </div>
    </div>
  </div>
</div>
</x-dc>
<script type="text/x-dc" data-dc-script data-props="{
  &quot;$preview&quot;: { &quot;width&quot;: 1280, &quot;height&quot;: 860 },
  &quot;theme&quot;: { &quot;editor&quot;: &quot;enum&quot;, &quot;options&quot;: [&quot;light&quot;, &quot;dark&quot;], &quot;default&quot;: &quot;light&quot;, &quot;tsType&quot;: &quot;'light'|'dark'&quot; }
}">
class Component extends DCLogic {
  state = { theme: this.props.theme || 'light', selected: 2 };
  renderVals(){
    const isDark = this.state.theme === 'dark';
    const sel = this.state.selected;
    const tones = [
      'linear-gradient(135deg,#d7c2a0,#b1916a)',
      'linear-gradient(135deg,#cdb38f,#a8855c)',
      'linear-gradient(135deg,#d9c8ac,#b29c78)',
      'linear-gradient(135deg,#c9ad88,#9d7e58)',
      'linear-gradient(135deg,#dccba9,#b59a70)',
      'linear-gradient(135deg,#ccb083,#a3835a)',
      'linear-gradient(135deg,#d3bd97,#ad9068)',
      'linear-gradient(135deg,#c6a87f,#997a52)',
    ];
    const faceFlags = [true, false, true, true, false, true, false, true];
    const linkedFlags = [false, false, false, true, false, false, true, false];
    const tiles = tones.map((tone, i) => ({
      idx: i,
      hasFaces: faceFlags[i],
      linked: linkedFlags[i],
      css: 'background:' + tone + ';' + (i === sel
        ? 'outline:3px solid var(--bf-primary);outline-offset:2px;'
        : 'outline:1px solid var(--bf-outline-variant);outline-offset:0;'),
      select: () => this.setState({ selected: i }),
    }));
    return {
      theme: this.state.theme,
      setLight: () => this.setState({ theme: 'light' }),
      setDark: () => this.setState({ theme: 'dark' }),
      lightSegClass: isDark ? 'bf-seg__item' : 'bf-seg__item bf-seg__item--selected',
      darkSegClass: isDark ? 'bf-seg__item bf-seg__item--selected' : 'bf-seg__item',
      tiles,
      caption: 'Photo ' + (sel + 1) + ' of 24 · Hale family album',
      heroCss: 'background:' + tones[sel] + ';',
    };
  }
}
</script>
</body>
</html>
