<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Bifrost{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/bifrost_logo.svg">
  <!-- BeerCSS (vendored, offline) + the small Bifrost brand layer. -->
  <link rel="stylesheet" href="/static/vendor/beer.min.css">
  <link rel="stylesheet" href="/static/bifrost.css">
  <script type="importmap">
  { "imports": { "lit": "/static/vendor/lit-all.min.js" } }
  </script>
  <script type="module" src="/static/vendor/beer.min.js"></script>
  {% block head %}{% endblock %}
</head>
<body class="light">
  {% set p = request.url.path %}
  <nav class="left">
    <header>
      <a href="/" title="Bifrost">
        <svg width="30" height="22" viewBox="0 0 30 22" aria-hidden="true"><path d="M3 20 A12 12 0 0 1 27 20" fill="none" stroke="var(--tertiary)" stroke-width="2.6" stroke-linecap="round"/><path d="M7 20 A8 8 0 0 1 23 20" fill="none" stroke="var(--warning)" stroke-width="2.6" stroke-linecap="round"/><path d="M11 20 A4 4 0 0 1 19 20" fill="none" stroke="var(--primary)" stroke-width="2.6" stroke-linecap="round"/></svg>
      </a>
    </header>
    <a class="{{ 'active' if p == '/' else '' }}" href="/"><i>home</i><div>Home</div></a>
    <a class="{{ 'active' if p.startswith('/transcribe') else '' }}" href="/transcribe"><i>edit_note</i><div>Transcribe</div></a>
    <a class="{{ 'active' if p.startswith('/sync') else '' }}" href="/sync/paperless"><i>description</i><div>Paperless</div></a>
    <a class="{{ 'active' if p.startswith('/citations') else '' }}" href="/citations"><i>format_quote</i><div>Citations</div></a>
    <a class="{{ 'active' if p.startswith('/places') else '' }}" href="/places"><i>map</i><div>Places</div></a>
    <a class="{{ 'active' if p.startswith('/idgen') else '' }}" href="/idgen"><i>tag</i><div>IDs</div></a>
  </nav>

  <main class="responsive">
    {% block content %}{% endblock %}
  </main>

  {% block scripts %}{% endblock %}
</body>
</html>
