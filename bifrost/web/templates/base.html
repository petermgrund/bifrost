<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Bifrost{% endblock %}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon.svg">
  <!-- BeerCSS (vendored, offline) + the small Bifrost brand layer. -->
  <link rel="stylesheet" href="/static/vendor/beer.min.css">
  <link rel="stylesheet" href="/static/bifrost.css">
  <script type="importmap">
  { "imports": { "lit": "/static/vendor/lit-all.min.js" } }
  </script>
  <script type="module" src="/static/vendor/beer.min.js"></script>
  {% block head %}{% endblock %}
</head>
<body class="light">
  <script>
    if (localStorage.getItem('bifrost-theme') === 'dark')
      document.body.classList.replace('light', 'dark');
    function toggleTheme() {
      const dark = document.body.classList.toggle('dark');
      document.body.classList.toggle('light', !dark);
      localStorage.setItem('bifrost-theme', dark ? 'dark' : 'light');
      syncThemeIcon();
    }
    function syncThemeIcon() {
      document.getElementById('theme-icon').textContent =
        document.body.classList.contains('dark') ? 'light_mode' : 'dark_mode';
    }
    addEventListener('DOMContentLoaded', syncThemeIcon);
  </script>
  <main class="responsive {% block main_class %}{% endblock %}">
    <nav>
      <svg width="30" height="22" viewBox="0 0 30 22" aria-hidden="true"><path d="M3 20 A12 12 0 0 1 27 20" fill="none" stroke="var(--tertiary)" stroke-width="2.6" stroke-linecap="round"/><path d="M7 20 A8 8 0 0 1 23 20" fill="none" stroke="var(--warning, #b07a00)" stroke-width="2.6" stroke-linecap="round"/><path d="M11 20 A4 4 0 0 1 19 20" fill="none" stroke="var(--primary)" stroke-width="2.6" stroke-linecap="round"/></svg>
      <h5 class="max">{% block nav_title %}Bifrost{% endblock %}</h5>
      {% block nav_actions %}
      <a class="button circle transparent" href="/style" aria-label="Edit the house style doc">
        <i>edit</i>
      </a>
      {% endblock %}
      <button class="circle transparent" onclick="toggleTheme()" aria-label="Toggle dark mode">
        <i id="theme-icon">dark_mode</i>
      </button>
    </nav>
    <div class="space"></div>
    {% block content %}{% endblock %}
  </main>
  {% block scripts %}{% endblock %}
</body>
</html>
