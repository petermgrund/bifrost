# Bifrost configuration example

gramps:
  base_url: "http://{device}:{port}/api"
  username: "REPLACE_ME"
  password: "REPLACE_ME"

paperless:
  base_url: "http://{device}:{port}"
  api_token: "REPLACE_ME"

# Bifrost resolved relative to this file's directory if not absolute
database: data/bifrost.db

sync:
  immich:
    # Dev-safety knob: set false in a dev config to disable the Sync
    # section's Immich block (scan preview stays; apply and the single-asset
    # sync endpoint answer 503), so a dev instance pointed at production
    # can't create objects in the real tree.
    enabled: true
    public_url: "https://your-immich-public-url"
    # face-linker's person map (mount it into the container read-only)
    person_map_path: "/legacy/person_map.yaml"
    # first prefix match wins; an asset under no mapping is a sync error
    path_mappings:
      - immich_prefix: "/usr/src/app/upload/upload/"
        gramps_prefix: "immich/"
  paperless:
    # Choose which Paperless tags are used to select documents for sync
    sync_tags: ["tag-1", "tag-2"]
    public_url: "https://your-paperless-public-url"
    gramps_public_url: "https://your-gramps-public-url"
    # Custom field ids in Paperless
    gramps_id_field_id: "REPLACE_ME"
    gramps_url_field_id: "REPLACE_ME"
    date_qualifier_field_id: null
    source_url_field_id: null
    # Paperless tag id marking documents with a transcription to sync
    transcription_tag_id: null
    # Paperless tag NAME marking docs to transcribe in place with Gemini OCR
    ocr_tag: "Gemini OCR"

anthropic:
  api_key: "REPLACE_ME"
  model: "claude-opus-4-8"

gemini:
  api_key: "REPLACE_ME"
  model: "gemini-3-flash-preview"
  # thinking_budget: 8192   # optional for thinking-capable models

places:
  # osm-to-gramps boundary rendering service + the GeoJSON sidecar dir
  # (mounted read-only; used only to show boundary status).
  osm_service_url: "http://{device}:{port}"
  boundaries_dir: "/boundaries"

# Optional: enables the Photos page (/photos) and the single-asset
# Immich->Gramps sync. The API key needs at least: asset.read, asset.update,
# album.read, person.read, stack.read, face.read (Account Settings > API Keys
# in Immich); without face.read the sync silently creates media with no
# person links.
immich:
  base_url: "http://{device}:2283"
  api_key: "REPLACE_ME"
