services:
  bifrost:
    build: .
    container_name: bifrost
    restart: unless-stopped
    ports:
      # Bound to all interfaces — private home LAN (eir 192.168.1.69) + tailnet + localhost.
      - "8800:8800"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
      # Repo root, read-write — carries the house-style master doc for the
      # citation composer and the House style editor (both resolve
      # /app/repo/house_style_master.md). A DIRECTORY mount on purpose: the
      # doc is also edited on the host, and host-side atomic saves
      # (write-temp-and-rename) would detach a single-file mount, silently
      # orphaning every web-side save. Backups land in data/house-style-backups.
      - .:/app/repo
      # boundary GeoJSON sidecars (status display on the Places page)
      - /mnt/storage/gramps/static-boundaries:/boundaries:ro
      # Dev: live-edit the frontend (CSS/JS/HTML) — changes apply on a browser
      # refresh, no rebuild. The image still bakes these; the mounts override
      # with the working tree. (Python changes still need `compose build`.)
      - ./bifrost/web/static:/app/bifrost/web/static
      - ./bifrost/web/templates:/app/bifrost/web/templates
