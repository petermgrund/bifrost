services:
  bifrost:
    build: .
    container_name: bifrost
    restart: unless-stopped
    ports:
      # Bound to tailnet + loopback only — never eth0.
      - "100.89.34.77:8800:8800"
      - "127.0.0.1:8800:8800"
    volumes:
      - ./config.yaml:/app/config.yaml:ro
      - ./data:/app/data
      # Phase 1 shim: write-through person_map.yaml export for the legacy
      # pipeline (file bind mount; the export truncates in place, preserving
      # the inode). Remove in Phase 2.
      - /opt/stacks/immich-to-gramps/person_map.yaml:/legacy/person_map.yaml
      # boundary GeoJSON sidecars (status display on the Places page)
      - /mnt/storage/gramps/static-boundaries:/boundaries:ro
